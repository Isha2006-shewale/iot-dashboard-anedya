<!DOCTYPE html>
<html>
<head>
  <title>Real-Time IoT Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Real-Time IoT Monitoring Dashboard</h1>
<p id="time">Last updated: --</p>

<p id="alertBox" class="normal">System Normal</p>

<div class="card">
  <h2>Device Status</h2>
  <p id="status">🟢 ONLINE</p>
  <button onclick="toggleDevice()">Turn OFF</button>
</div>

<div class="card">
  <h2>Temperature (°C)</h2>
  <p id="temp">-- °C</p>
</div>

<div class="card">
  <h2>Humidity (%)</h2>
  <p id="hum">-- %</p>
</div>

<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
